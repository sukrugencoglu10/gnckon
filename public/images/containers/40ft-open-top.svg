<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="40 ft Open Top Konteyner">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0284c7"/><stop offset="1" stop-color="#0369a1"/></linearGradient>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#e2e8f0"/></linearGradient>
    <linearGradient id="tarp" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#cbd5e1"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="520" rx="360" ry="22" fill="#0b1220" opacity=".15"/>
  <rect x="80" y="190" width="640" height="270" rx="12" fill="url(#g)"/>
  
  <g stroke="#fff" stroke-opacity=".22" stroke-width="3">
    <line x1="110" y1="190" x2="110" y2="450"/><line x1="140" y1="190" x2="140" y2="450"/><line x1="170" y1="190" x2="170" y2="450"/>
    <line x1="200" y1="190" x2="200" y2="450"/><line x1="230" y1="190" x2="230" y2="450"/><line x1="260" y1="190" x2="260" y2="450"/>
    <line x1="290" y1="190" x2="290" y2="450"/><line x1="320" y1="190" x2="320" y2="450"/><line x1="350" y1="190" x2="350" y2="450"/>
    <line x1="380" y1="190" x2="380" y2="450"/><line x1="410" y1="190" x2="410" y2="450"/><line x1="440" y1="190" x2="440" y2="450"/>
    <line x1="470" y1="190" x2="470" y2="450"/><line x1="500" y1="190" x2="500" y2="450"/><line x1="530" y1="190" x2="530" y2="450"/>
    <line x1="560" y1="190" x2="560" y2="450"/><line x1="590" y1="190" x2="590" y2="450"/><line x1="620" y1="190" x2="620" y2="450"/>
    <line x1="650" y1="190" x2="650" y2="450"/><line x1="680" y1="190" x2="680" y2="450"/>
  </g>
  
  <!-- Tarp Top -->
  <path d="M 75 205 Q 400 170 725 205 L 715 215 L 85 215 Z" fill="url(#tarp)" />
  <rect x="75" y="200" width="650" height="15" rx="4" fill="url(#tarp)"/>
  <!-- Tarp ropes/ties -->
  <g stroke="#64748b" stroke-width="2">
    <line x1="120" y1="210" x2="120" y2="225"/><line x1="180" y1="210" x2="180" y2="225"/>
    <line x1="240" y1="210" x2="240" y2="225"/><line x1="300" y1="210" x2="300" y2="225"/>
    <line x1="360" y1="210" x2="360" y2="225"/><line x1="420" y1="210" x2="420" y2="225"/>
    <line x1="480" y1="210" x2="480" y2="225"/><line x1="540" y1="210" x2="540" y2="225"/>
    <line x1="600" y1="210" x2="600" y2="225"/><line x1="660" y1="210" x2="660" y2="225"/>
  </g>

  <text x="400" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="52" fill="#fff">40 ft OPEN TOP</text>
  <text x="400" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#fff" opacity=".85">BRANDA KAPAKLI</text>
  <rect x="70" y="450" width="660" height="22" rx="4" fill="#0b1220"/>
